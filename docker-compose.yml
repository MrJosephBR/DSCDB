services:
  db:
    image: postgres:16
    container_name: voc-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: voc_user
      POSTGRES_PASSWORD: voc_password
      POSTGRES_DB: vocs_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voc_user -d vocs_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    container_name: voc-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://voc_user:voc_password@db:5432/vocs_db
      NODE_ENV: production
      APP_ENV: production
      APP_URL: http://localhost:3000
      JWT_SECRET: change_this_secret
      UPLOAD_DIR: /app/uploads
      MAX_UPLOAD_SIZE_MB: 50
      HOSTNAME: 0.0.0.0
      PORT: 3000
    ports:
      - "3000:3000"
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5

  caddy:
    image: caddy:2-alpine
    container_name: voc-caddy
    profiles:
      - production
    restart: unless-stopped
    depends_on:
      - app
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  uploads:
  caddy_data:
  caddy_config:
